[project]
name = "chloe-core"
version = "0.1.0"
description = "Core pipeline library for personalized pet cancer neoantigen identification"
readme = "../../README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
authors = [
    { name = "Chloe OS Contributors" },
]
dependencies = [
    "cyvcf2>=0.31.0",
    "jinja2>=3.1.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
mhcflurry = ["mhcflurry>=2.1.0"]
structure = ["transformers>=4.40.0", "torch>=2.0.0"]
interpretation = ["anthropic>=0.40.0"]
all = [
    "mhcflurry>=2.1.0",
    "transformers>=4.40.0",
    "torch>=2.0.0",
    "anthropic>=0.40.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.8.0",
    "mypy>=1.13.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/chloe_core"]
