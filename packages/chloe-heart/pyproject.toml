[project]
name = "chloe-heart"
version = "0.1.0"
description = "Canine cardiac monitoring analysis — ECG processing, arrhythmia detection, and health scoring"
readme = "../../README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
authors = [
    { name = "Chloe OS Contributors" },
]
dependencies = [
    "numpy>=1.24.0",
    "scipy>=1.11.0",
    "jinja2>=3.1.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
edf = ["pyedflib>=0.1.35"]
wfdb = ["wfdb>=4.1.0"]
ml = ["torch>=2.0.0", "transformers>=4.40.0"]
interpretation = ["anthropic>=0.40.0"]
all = [
    "pyedflib>=0.1.35",
    "wfdb>=4.1.0",
    "torch>=2.0.0",
    "transformers>=4.40.0",
    "anthropic>=0.40.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/chloe_heart"]
